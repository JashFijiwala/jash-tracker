<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jash.tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;
    --accent:#7c6dfa;--accent2:#fa6d9a;--accent3:#6dfabd;
    --text:#e8e6ff;--muted:#6b6880;--warn:#faa86d;
  }
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;min-height:100vh;overflow-x:hidden}
  .noise{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");opacity:.4}
  .app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:24px 16px 60px}
  .header{margin-bottom:32px}
  .header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px}
  .logo span{color:var(--accent)}
  .date-badge{font-size:11px;color:var(--muted);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
  .tabs{display:flex;gap:2px;margin-bottom:24px;background:var(--surface);padding:4px;border-radius:10px;border:1px solid var(--border);overflow-x:auto}
  .tab{flex:1;min-width:80px;padding:8px 12px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap}
  .tab.active{background:var(--surface2);color:var(--text);box-shadow:0 0 0 1px var(--border)}
  .tab:hover:not(.active){color:var(--text)}
  .dsa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
  .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .stat-input{width:100%;background:transparent;border:none;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent);outline:none;cursor:text}
  .stat-input.a2{color:var(--accent2)}.stat-input.a3{color:var(--accent3)}.stat-input.aw{color:var(--warn)}
  .progress-bar-wrap{margin-bottom:20px}
  .progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px}
  .progress-bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;border:1px solid var(--border)}
  .progress-fill{height:100%;border-radius:99px;transition:width .4s;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .topic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .topic-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;user-select:none}
  .topic-item:hover{border-color:var(--accent)}
  .topic-item.done{border-color:var(--accent3);background:rgba(109,250,189,.05)}
  .topic-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--muted);flex-shrink:0;transition:all .15s}
  .topic-item.done .topic-dot{background:var(--accent3);border-color:var(--accent3)}
  .topic-name{font-size:12px;flex:1}
  .topic-count{font-size:10px;color:var(--muted)}
  .add-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .inp{flex:1;min-width:100px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color .15s}
  .inp:focus{border-color:var(--accent)}
  .sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;cursor:pointer}
  .btn{padding:9px 16px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s;white-space:nowrap}
  .btn:hover{opacity:.85}
  .btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
  .btn-del{background:transparent;border:1px solid var(--border);color:var(--muted)}
  .btn-del:hover{border-color:var(--accent2);color:var(--accent2);opacity:1}
  .app-table{width:100%;border-collapse:collapse}
  .app-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border)}
  .app-table td{padding:10px 12px;border-bottom:1px solid rgba(42,42,58,.5);font-size:12px;vertical-align:middle}
  .app-table tr:hover td{background:var(--surface)}
  .app-table tr:last-child td{border-bottom:none}
  .tier-a{color:var(--accent3)}.tier-b{color:var(--accent)}
  .oss-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}
  .oss-repo{color:var(--accent);font-weight:500;font-size:13px}
  .oss-desc{color:var(--muted);font-size:11px;margin-top:4px}
  .oss-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .month-block{margin-bottom:24px}
  .month-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .month-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .milestone-item{border-bottom:1px solid rgba(42,42,58,.4)}
  .milestone-item:last-child{border-bottom:none}
  .milestone-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0 5px;cursor:pointer;user-select:none}
  .milestone-check{width:16px;height:16px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;margin-top:1px}
  .milestone-item.done .milestone-check{background:var(--accent3);border-color:var(--accent3);color:#0a0a0f}
  .milestone-text{font-size:12px;line-height:1.5;flex:1}
  .milestone-item.done .milestone-text{color:var(--muted);text-decoration:line-through}
  .priority-tag{display:inline-block;margin-left:6px;font-size:10px;padding:1px 6px;border-radius:4px}
  .p-now{background:rgba(250,109,154,.2);color:var(--accent2)}
  .p-high{background:rgba(124,109,250,.2);color:var(--accent)}
  .res-toggle{padding:0 0 7px 26px}
  .res-btn{font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:2px 8px;background:transparent;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
  .res-btn:hover{border-color:var(--accent);color:var(--accent)}
  .milestone-item.done .res-btn{opacity:.35}
  .res-panel{display:none;padding:0 0 10px 26px}
  .res-panel.open{display:block}
  .res-list{display:flex;flex-direction:column;gap:6px}
  .res-link{display:flex;align-items:flex-start;gap:10px;text-decoration:none;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;transition:border-color .15s}
  .res-link:hover{border-color:var(--accent)}
  .res-icon{font-size:15px;flex-shrink:0;margin-top:1px}
  .res-title{font-size:11px;color:var(--text);font-weight:500;margin-bottom:2px}
  .res-sub{font-size:10px;color:var(--muted);line-height:1.4}
  .panel-toggles{display:flex;flex-wrap:wrap;gap:6px;padding:0 0 7px 26px}
  .notes-btn{font-size:10px;color:var(--warn);border:1px solid rgba(250,168,109,.35);border-radius:4px;padding:2px 8px;background:transparent;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
  .notes-btn:hover{border-color:var(--warn);background:rgba(250,168,109,.08)}
  .milestone-item.done .notes-btn{opacity:.35}
  .notes-panel{display:none;padding:0 0 10px 26px}
  .notes-panel.open{display:block}
  .notes-list{display:flex;flex-direction:column;gap:5px}
  .note-item{display:flex;gap:9px;padding:8px 11px;background:rgba(250,168,109,.05);border:1px solid rgba(250,168,109,.15);border-radius:7px;font-size:11px;line-height:1.6;color:var(--text)}
  .note-num{color:var(--warn);font-weight:700;flex-shrink:0;min-width:14px;margin-top:1px}
  .section-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
  .empty-state{text-align:center;color:var(--muted);padding:40px;font-size:12px}
  .scroll-x{overflow-x:auto}
  select option{background:#1a1a24}
</style>
</head>
<body>
<div class="noise"></div>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">jash<span>.</span>tracker</div>
      <div class="date-badge" id="dateBadge"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('dsa')">DSA</button>
    <button class="tab" onclick="switchTab('apps')">Applications</button>
    <button class="tab" onclick="switchTab('oss')">Open Source</button>
    <button class="tab" onclick="switchTab('milestones')">Milestones</button>
  </div>

  <!-- DSA -->
  <div id="tab-dsa">
    <div class="dsa-grid">
      <div class="stat-card"><div class="stat-label">Problems Solved</div><input class="stat-input" id="dsa-total" type="number" min="0" placeholder="0" oninput="saveStats()"></div>
      <div class="stat-card"><div class="stat-label">Hard Problems</div><input class="stat-input a2" id="dsa-hard" type="number" min="0" placeholder="0" oninput="saveStats()"></div>
      <div class="stat-card"><div class="stat-label">LC Contest Rating</div><input class="stat-input a3" id="dsa-rating" type="number" min="0" placeholder="0" oninput="saveStats()"></div>
      <div class="stat-card"><div class="stat-label">Mock Interviews</div><input class="stat-input aw" id="dsa-mocks" type="number" min="0" placeholder="0" oninput="saveStats()"></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-label"><span>Progress to 500 problems</span><span id="dsa-pct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="dsa-bar" style="width:0%"></div></div>
    </div>
    <div class="section-title">Topics</div>
    <div class="topic-grid" id="topicGrid"></div>
  </div>

  <!-- APPS -->
  <div id="tab-apps" style="display:none">
    <div class="add-row">
      <input class="inp" id="app-company" placeholder="Company" style="max-width:160px">
      <input class="inp" id="app-role" placeholder="Role" style="max-width:160px">
      <select class="sel" id="app-tier">
        <option value="A">Tier A (Indian)</option>
        <option value="B">Tier B (AI startup)</option>
        <option value="C">US 2027</option>
        <option value="INT">Internship</option>
      </select>
      <select class="sel" id="app-status">
        <option value="pending">Pending</option>
        <option value="applied">Applied</option>
        <option value="oa">OA</option>
        <option value="interview">Interview</option>
        <option value="offer">Offer</option>
        <option value="rejected">Rejected</option>
      </select>
      <button class="btn btn-sm" onclick="addApp()">+ Add</button>
    </div>
    <div class="dsa-grid" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-label">Total Applied</div><div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent)" id="count-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Active / OA</div><div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--warn)" id="count-active">0</div></div>
      <div class="stat-card"><div class="stat-label">Interviews</div><div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent2)" id="count-int">0</div></div>
      <div class="stat-card"><div class="stat-label">Offers</div><div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent3)" id="count-offer">0</div></div>
    </div>
    <div class="scroll-x">
      <table class="app-table">
        <thead><tr><th>Company</th><th>Role</th><th>Tier</th><th>Status</th><th>Date</th><th></th></tr></thead>
        <tbody id="appTableBody"></tbody>
      </table>
      <div id="apps-empty" class="empty-state" style="display:none">No applications yet.</div>
    </div>
  </div>

  <!-- OSS -->
  <div id="tab-oss" style="display:none">
    <div class="add-row">
      <input class="inp" id="oss-repo" placeholder="Repo (e.g. supabase/supabase)">
      <input class="inp" id="oss-desc" placeholder="What you did / PR title">
      <select class="sel" id="oss-status">
        <option value="planned">Planned</option>
        <option value="in-progress">In Progress</option>
        <option value="submitted">Submitted</option>
        <option value="merged">Merged ✓</option>
      </select>
      <button class="btn btn-sm" onclick="addOSS()">+ Add</button>
    </div>
    <div class="dsa-grid" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-label">PRs Merged</div><div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent3)" id="oss-merged">0</div></div>
      <div class="stat-card"><div class="stat-label">In Progress</div><div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent)" id="oss-wip">0</div></div>
      <div class="stat-card"><div class="stat-label">Total Contributions</div><div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--warn)" id="oss-total">0</div></div>
    </div>
    <div id="ossCards"></div>
    <div id="oss-empty" class="empty-state" style="display:none">No OSS contributions yet.</div>
  </div>

  <!-- MILESTONES -->
  <div id="tab-milestones" style="display:none">
    <div id="milestonesContainer"></div>
  </div>
</div>

<script>
const SK = 'jash_tracker_v3';
const TOPICS = [
  {id:'arrays',name:'Arrays & Hashing',target:60},
  {id:'twoptr',name:'Two Pointers / Sliding Window',target:40},
  {id:'bsearch',name:'Binary Search',target:30},
  {id:'linked',name:'Linked Lists',target:25},
  {id:'stacks',name:'Stacks / Monotonic',target:25},
  {id:'recursion',name:'Recursion & Backtracking',target:30},
  {id:'bits',name:'Bit Manipulation',target:15},
  {id:'trees',name:'Trees & BST',target:40},
  {id:'heaps',name:'Heaps & Priority Queue',target:20},
  {id:'tries',name:'Tries',target:10},
  {id:'graphs',name:'Graphs (BFS/DFS/Dijkstra)',target:40},
  {id:'union',name:'Union-Find',target:12},
  {id:'dp',name:'Dynamic Programming (Foundations)',target:50},
  {id:'dpAdv',name:'Advanced DP (Aditya Verma)',target:40},
  {id:'greedy',name:'Greedy',target:20},
  {id:'sysdesign',name:'System Design Basics',target:10},
];

const MS = [
  {month:'April 27 — RIGHT NOW',items:[
    {id:'m1',text:'Apply Amazon 6-month SDE Intern (July–Dec) at amazon.jobs',priority:'now',n:[
      'Apply today — amazon.jobs → search "SDE Intern" + India. Rolling basis, closes fast, no fixed deadline.',
      'OA format: 2 DSA problems (1 easy + 1 medium) + work-style simulation MCQ. 90 minutes total. Most candidates fail here, not at the resume screen.',
      'Before the OA: write out 16 STAR stories mapped to Amazon\'s 16 Leadership Principles. Behavioural rounds test these explicitly and you need them prepared in advance.',
      'Timeline: apply March–May → OA invite within 1–2 weeks → interviews April–June → start date July.',
      'If you get the OA, treat DSA prep as the priority for that week. The problems are medium-difficulty but timed strictly.',
    ],res:[
      {i:'🔗',t:'Amazon Jobs — SDE Intern India',s:'Search "SDE Intern" with India filter',u:'https://www.amazon.jobs/en/search?base_query=software+development+engineer+intern&loc_query=India'},
      {i:'📋',t:'Amazon Leadership Principles',s:'Prep 16 STAR stories around these — mandatory for behavioural rounds',u:'https://www.amazon.jobs/content/en/our-workplace/leadership-principles'},
      {i:'💬',t:'LeetCode Discuss — Amazon OA patterns',s:'Recent OA questions shared by candidates',u:'https://leetcode.com/discuss/interview-question?currentPage=1&orderBy=hot&query=amazon+OA+intern'},
    ]},
    {id:'m2',text:'Set up Claude Cowork folder (ABOUT ME / OUTPUTS / TEMPLATES)',priority:'now',n:[
      'Download Claude desktop app at claude.ai/download. Requires Claude Pro (~$20/mo) — free tier won\'t work.',
      'Create a folder on your Desktop: "Claude Cowork" with 3 subfolders: ABOUT ME, OUTPUTS, TEMPLATES.',
      'Open Cowork, click the folder icon at the top, and select your Claude Cowork folder.',
      'Also drop your resume.pdf and a file called target-companies.txt into ABOUT ME — Cowork reads everything in that folder.',
      'Don\'t skip the about-me setup step. Without it every session starts blank and Cowork is just a file browser.',
    ],res:[
      {i:'📖',t:'Ruben Hassid — Set up Claude Cowork (April 2026)',s:'The definitive setup guide, step by step',u:'https://ruben.substack.com/p/claude-cowork-20'},
      {i:'📖',t:'Ruben Hassid — Cowork + Projects',s:'Memory that persists between sessions',u:'https://ruben.substack.com/p/claude-cowork-project'},
      {i:'🌐',t:'claude-co.work — starter prompts',s:'Free resource with copy-paste prompts for Cowork',u:'https://claude-co.work'},
    ]},
    {id:'m3',text:'Create about-me.md using Cowork interview prompt',priority:'high',n:[
      'Paste this prompt into Cowork: "Interview me with 20 questions to build a complete about-me.md. Ask one at a time. Cover: background, goals, current situation, writing style, what I\'m building, what I want you to always remember. Keep under 2,000 tokens."',
      'Answer every question fully and honestly — the quality of every future Cowork output depends directly on this file.',
      'After finishing, run a second interview: "Now interview me to build an anti-AI-style.md file. Ask about phrases I hate, my natural tone, ideal sentence length, words I never use." Save it separately.',
      'Update about-me.md every 2–3 weeks as your situation changes — new projects shipped, applications submitted, anything significant.',
    ],res:[
      {i:'📖',t:'Ruben Hassid — Claude to sound like you',s:'How to build the voice file that makes Claude write like you',u:'https://ruben.substack.com/p/i-am-just-a-text-file'},
      {i:'🛠',t:'how-to-ai.guide',s:'Free download of Ruben\'s template folder + anti-AI writing file',u:'https://how-to-ai.guide'},
    ]},
  ]},
  {month:'May 2026',items:[
    {id:'m4',text:'Hit 100 LeetCode — Arrays → Hashing → Two Pointers → Sliding Window → Binary Search',priority:'high',n:[
      'Do Striver A2Z in strict order. Don\'t skip ahead to graphs or DP because they look interesting — foundation topics have patterns that every hard problem builds on.',
      'Per topic: solve 3 easy problems to build pattern recognition, then go straight to mediums. Don\'t camp on easy problems.',
      'Watch NeetCode only if stuck for more than 25 minutes — not before attempting. Watching first turns it into passive learning.',
      'The next morning, re-solve every problem you got wrong the day before from scratch. No peeking. This is the most important daily habit.',
      'In month 1, time loosely. From month 3, enforce a strict 35-minute limit per problem — that\'s roughly what you get in real OAs.',
    ],res:[
      {i:'📋',t:'Striver A2Z Sheet — start here',s:'Most structured sheet for Indian hiring, covers every topic in order',u:'https://takeuforward.org/strivers-a2z-dsa-course/strivers-a2z-dsa-course-sheet-2/'},
      {i:'▶️',t:'Aditya Verma — Sliding Window playlist',s:'Best YouTube resource for sliding window patterns',u:'https://www.youtube.com/playlist?list=PL_z_8CaSLPWeM8BDJmIYDaoQ5zuwyxnfj'},
    ]},
    {id:'m5',text:'[OR] Pick flagship project idea (RAG app / MCP agent / browser extension)',priority:'high',n:[
      'Rule 1: pick something you\'d actually use yourself. Motivation collapses on projects you don\'t care about.',
      'Rule 2: AI must be the core, not a feature. A CRUD app with an AI button bolted on is not an AI project to a recruiter.',
      'Rule 3: must be deployable as an MVP in one week. If scaffolding takes longer, the idea is too complex.',
      'Validation test: can you explain what it does and who it\'s for in one sentence? If not, keep narrowing the scope.',
      'Good litmus: would you pay ₹100/month for it? Would 10 of your friends?',
      'Avoid saturated ideas in 2025–26: ChatGPT wrapper, "chat with your PDF", food delivery clone, generic todo app. Recruiters see hundreds of these.',
    ],res:[
      {i:'📖',t:'Top 10 LLM & RAG projects for AI portfolio (2025–26)',s:'Concrete ideas that actually get recruiter attention',u:'https://growtechie.substack.com/p/top-10-llm-and-rag-projects-for-your'},
      {i:'🎓',t:'HuggingFace Learn — RAG & Agents course',s:'Free, hands-on, covers transformers / RAG / tool-use',u:'https://huggingface.co/learn'},
      {i:'🎓',t:'DeepLearning.AI — Building RAG Agents with LLMs',s:'Free 1-hour course, gives you the mental model before building',u:'https://www.deeplearning.ai/short-courses/building-agentic-rag-with-llamaindex/'},
      {i:'🛠',t:'LangChain JS — RAG quickstart',s:'Next.js + LangChain + Supabase pgvector — your exact stack',u:'https://js.langchain.com/docs/tutorials/rag/'},
      {i:'🛠',t:'Vercel AI SDK',s:'Cleanest way to add streaming AI to a Next.js app',u:'https://sdk.vercel.ai/docs/introduction'},
    ]},
    {id:'m5b',text:'[OR] Learn RLHF — foundations → implementation → fine-tune a small model',priority:'high',n:[
      'Week 1: Watch Karpathy "Let\'s build GPT from scratch" (2h video). Then implement it yourself. Non-negotiable prerequisite — you must understand the transformer before fine-tuning it.',
      'Week 2: Read Chip Huyen\'s RLHF post (30 min). Watch Yannic Kilcher\'s InstructGPT walkthrough (45 min). Then read the actual InstructGPT paper — it\'s 15 pages and your publication background means it won\'t be alien.',

let state={dsa:{total:'',hard:'',rating:'',mocks:''},topics:{},apps:[],oss:[],milestones:{},resOpen:{},notesOpen:{}};
function load(){try{const r=localStorage.getItem(SK);if(r)state={...state,...JSON.parse(r)}}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(state))}catch(e){}}

function saveStats(){
  ['total','hard','rating','mocks'].forEach(k=>state.dsa[k]=document.getElementById('dsa-'+k).value);
  const p=Math.min(100,Math.round((parseInt(state.dsa.total)||0)/500*100));
  document.getElementById('dsa-bar').style.width=p+'%';
  document.getElementById('dsa-pct').textContent=p+'%';
  save();
}

function renderTopics(){
  document.getElementById('topicGrid').innerHTML=TOPICS.map(t=>`
    <div class="topic-item ${state.topics[t.id]?'done':''}" onclick="toggleTopic('${t.id}')">
      <div class="topic-dot"></div><div class="topic-name">${t.name}</div><div class="topic-count">~${t.target}</div>
    </div>`).join('');
}
function toggleTopic(id){state.topics[id]=!state.topics[id];renderTopics();save();}

function addApp(){
  const c=document.getElementById('app-company').value.trim();
  if(!c)return;
  state.apps.unshift({id:Date.now(),company:c,role:document.getElementById('app-role').value.trim(),tier:document.getElementById('app-tier').value,status:document.getElementById('app-status').value,date:new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short'})});
  document.getElementById('app-company').value='';document.getElementById('app-role').value='';
  renderApps();save();
}
function updateAppStatus(id,val){const a=state.apps.find(x=>x.id===id);if(a){a.status=val;renderApps();save();}}
function deleteApp(id){state.apps=state.apps.filter(x=>x.id!==id);renderApps();save();}
function renderApps(){
  const sl={pending:'Pending',applied:'Applied',oa:'OA',interview:'Interview',offer:'Offer ✓',rejected:'Rejected'};
  const tl={A:'<span class="tier-a">Tier A</span>',B:'<span class="tier-b">Tier B</span>',C:'<span style="color:var(--warn)">US 2027</span>',INT:'<span style="color:var(--accent2)">Intern</span>'};
  document.getElementById('count-total').textContent=state.apps.length;
  document.getElementById('count-active').textContent=state.apps.filter(a=>a.status==='applied'||a.status==='oa').length;
  document.getElementById('count-int').textContent=state.apps.filter(a=>a.status==='interview').length;
  document.getElementById('count-offer').textContent=state.apps.filter(a=>a.status==='offer').length;
  const tb=document.getElementById('appTableBody');
  const em=document.getElementById('apps-empty');
  if(!state.apps.length){tb.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  tb.innerHTML=state.apps.map(a=>`<tr>
    <td style="font-weight:500">${a.company}</td>
    <td style="color:var(--muted)">${a.role||'—'}</td>
    <td>${tl[a.tier]||a.tier}</td>
    <td><select class="sel" style="padding:3px 8px;font-size:11px" onchange="updateAppStatus(${a.id},this.value)">${Object.keys(sl).map(s=>`<option value="${s}" ${a.status===s?'selected':''}>${sl[s]}</option>`).join('')}</select></td>
    <td style="color:var(--muted);font-size:11px">${a.date}</td>
    <td><button class="btn btn-sm btn-del" onclick="deleteApp(${a.id})">✕</button></td>
  </tr>`).join('');
}

function addOSS(){
  const r=document.getElementById('oss-repo').value.trim();
  if(!r)return;
  state.oss.unshift({id:Date.now(),repo:r,desc:document.getElementById('oss-desc').value.trim(),status:document.getElementById('oss-status').value});
  document.getElementById('oss-repo').value='';document.getElementById('oss-desc').value='';
  renderOSS();save();
}
function updateOSSStatus(id,val){const o=state.oss.find(x=>x.id===id);if(o){o.status=val;renderOSS();save();}}
function deleteOSS(id){state.oss=state.oss.filter(x=>x.id!==id);renderOSS();save();}
function renderOSS(){
  const sl={planned:'Planned','in-progress':'In Progress',submitted:'Submitted →',merged:'Merged ✓'};
  document.getElementById('oss-merged').textContent=state.oss.filter(x=>x.status==='merged').length;
  document.getElementById('oss-wip').textContent=state.oss.filter(x=>x.status==='in-progress'||x.status==='submitted').length;
  document.getElementById('oss-total').textContent=state.oss.length;
  const c=document.getElementById('ossCards');
  const em=document.getElementById('oss-empty');
  if(!state.oss.length){c.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  c.innerHTML=state.oss.map(o=>`<div class="oss-card">
    <div><div class="oss-repo">${o.repo}</div><div class="oss-desc">${o.desc||'No description'}</div></div>
    <div class="oss-actions">
      <select class="sel" style="padding:3px 8px;font-size:11px" onchange="updateOSSStatus(${o.id},this.value)">${['planned','in-progress','submitted','merged'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${sl[s]}</option>`).join('')}</select>
      <button class="btn btn-sm btn-del" onclick="deleteOSS(${o.id})">✕</button>
    </div>
  </div>`).join('');
}

function toggleMilestone(id){state.milestones[id]=!state.milestones[id];renderMilestones();save();}
function toggleRes(id,e){if(e)e.stopPropagation();state.resOpen[id]=!state.resOpen[id];renderMilestones();save();}
function toggleNotes(id,e){if(e)e.stopPropagation();state.notesOpen[id]=!state.notesOpen[id];renderMilestones();save();}

function renderMilestones(){
  document.getElementById('milestonesContainer').innerHTML=MS.map(block=>{
    const done=block.items.filter(i=>state.milestones[i.id]).length;
    return `<div class="month-block">
      <div class="month-title">${block.month} <span style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono'">${done}/${block.items.length}</span></div>
      ${block.items.map(item=>{
        const hasR=item.res&&item.res.length>0;
        const hasN=item.n&&item.n.length>0;
        const resOpen=state.resOpen[item.id];
        const notesOpen=state.notesOpen[item.id];
        return `<div class="milestone-item ${state.milestones[item.id]?'done':''}">
          <div class="milestone-row" onclick="toggleMilestone('${item.id}')">
            <div class="milestone-check">${state.milestones[item.id]?'✓':''}</div>
            <div class="milestone-text">${item.text}${item.priority==='now'?'<span class="priority-tag p-now">NOW</span>':''}${item.priority==='high'?'<span class="priority-tag p-high">HIGH</span>':''}</div>
          </div>
          ${(hasN||hasR)?`<div class="panel-toggles">
            ${hasN?`<button class="notes-btn" onclick="toggleNotes('${item.id}',event)">${notesOpen?'▾ hide notes':'▸ notes ('+item.n.length+')'}</button>`:''}
            ${hasR?`<button class="res-btn" onclick="toggleRes('${item.id}',event)">${resOpen?'▾ hide resources':'▸ resources ('+item.res.length+')'}</button>`:''}
          </div>`:''}
          ${hasN?`<div class="notes-panel ${notesOpen?'open':''}">
            <div class="notes-list">${item.n.map((note,i)=>`
              <div class="note-item"><span class="note-num">${i+1}</span><span>${note}</span></div>`).join('')}
            </div>
          </div>`:''}
          ${hasR?`<div class="res-panel ${resOpen?'open':''}">
            <div class="res-list">${item.res.map(r=>`
              <a class="res-link" href="${r.u}" target="_blank" rel="noopener">
                <span class="res-icon">${r.i}</span>
                <div><div class="res-title">${r.t}</div><div class="res-sub">${r.s}</div></div>
              </a>`).join('')}
            </div>
          </div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function switchTab(name){
  ['dsa','apps','oss','milestones'].forEach(t=>document.getElementById('tab-'+t).style.display=t===name?'block':'none');
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['dsa','apps','oss','milestones'][i]===name));
}

function init(){
  load();
  document.getElementById('dateBadge').textContent=new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  ['total','hard','rating','mocks'].forEach(k=>{const el=document.getElementById('dsa-'+k);if(el)el.value=state.dsa[k]||'';});
  const p=Math.min(100,Math.round((parseInt(state.dsa.total)||0)/500*100));
  document.getElementById('dsa-bar').style.width=p+'%';
  document.getElementById('dsa-pct').textContent=p+'%';
  renderTopics();renderApps();renderOSS();renderMilestones();
}
init();
</script>
</body>
</html>
